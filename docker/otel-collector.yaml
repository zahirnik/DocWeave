# docker/otel-collector.yaml
# Minimal OpenTelemetry Collector config for local development.
# Receives traces/metrics/logs and exports them to stdout (logging).
# In real deployments, switch exporters to Tempo/Jaeger/Prometheus/etc.

receivers:
  otlp:
    protocols:
      grpc:
      http:

processors:
  batch:

exporters:
  logging:
    loglevel: info

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [logging]
