apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
  namespace: convai-rag
  labels:
    app.kubernetes.io/name: rag-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: rag-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rag-api
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/convai-finance-agentic-rag-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: rag-config
            - secretRef:
                name: rag-secrets
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
