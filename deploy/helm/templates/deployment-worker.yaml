apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "convai-finance-agentic-rag.fullname" . }}-worker
  labels:
    app.kubernetes.io/name: rag-worker
spec:
  replicas: {{ .Values.replicaCount.worker }}
  selector:
    matchLabels:
      app.kubernetes.io/name: rag-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rag-worker
    spec:
      containers:
        - name: worker
          image: {{ .Values.image.worker }}
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: {{ include "convai-finance-agentic-rag.fullname" . }}-config
            - secretRef:
                name: {{ include "convai-finance-agentic-rag.fullname" . }}-secrets
          args: ["celery", "-A", "apps.worker.celery_app:celery", "worker", "-l", "INFO", "-Q", "default,ingest,embed"]
