# Model registry & defaults
#
# You can switch providers without code changes—scripts read from here.
# For full-local/offline mode set llm.provider=mock and embeddings.model=gte-small.

llm:
  provider: openai            # openai | azure | ollama | vllm | mock
  model: gpt-4o-mini          # or gpt-4o, gpt-4.1, etc.
  temperature: 0.2
  max_tokens: 512
  # azure:
  #   deployment: gpt-4o-mini
  #   api_version: "2024-08-01-preview"
  # ollama:
  #   model: llama3.1:8b-instruct

embeddings:
  provider: auto              # auto→OpenAI if key present; else local deterministic fallback
  model: text-embedding-3-small  # or bge-small, gte-small (if running local)
  batch_size: 64
  normalize: true

reranker:
  enabled: false
  model: bge-reranker-base    # or cross-encoder/ms-marco-MiniLM-L-6-v2
  top_k: 50

stores:
  # Choose a primary vector store
  primary: pgvector           # pgvector | qdrant | chroma
  pgvector:
    dsn: ${PGVECTOR_URL}
    collection: finance_demo
  qdrant:
    url: http://localhost:6333
    collection: finance_demo
  chroma:
    path: ./.chroma
    collection: finance_demo
